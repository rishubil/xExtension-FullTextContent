services:
  tests:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEFUDDLE_VERSION: "0.18.1"
    user: root
    entrypoint: ""
    command:
      - sh
      - /var/www/FreshRSS/extensions/xExtension-FullTextContent/tests/integration/run-in-container.sh
    environment:
      DATA_PATH: /var/www/FreshRSS/data
      TEST_DEPS_DIR: /opt/test-deps
    volumes:
      - type: bind
        source: ../..
        target: /var/www/FreshRSS/extensions/xExtension-FullTextContent
        read_only: true
      - freshrss_data:/var/www/FreshRSS/data

volumes:
  freshrss_data:
